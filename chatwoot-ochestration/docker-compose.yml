services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpassword}
      POSTGRES_DB: ${POSTGRES_DB:-agentdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentuser} -d ${POSTGRES_DB:-agentdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the 'db' service instead of localhost
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpassword}@db:5432/${POSTGRES_DB:-agentdb}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\"" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── React / Nginx Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Points the compiled JS to the backend — change to your domain in prod
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: agent_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
